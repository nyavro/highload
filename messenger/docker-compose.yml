services:
  master:
    container_name: "${COMPOSE_PROJECT_NAME:-citus}_master"
    image: 'citusdata/citus:12.1' 
    ports:
      - "${MASTER_EXTERNAL_PORT:-5432}:5432"
    labels: [ "com.citusdata.role=master" ]
    environment: &AUTH
      POSTGRES_DB: "messenger"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "pgpassword"
      CITUS_PASSWORD: "pgpassword"
    volumes:
      - citus_master_data:/var/lib/postgresql/data
      - ./db-config/init.sql:/docker-entrypoint-initdb.d/init.sql       
    entrypoint: >
      sh -c "
      echo 'Waiting for workers...';
      until pg_isready -h worker1 -p 5432 && pg_isready -h worker2 -p 5432; do
        echo 'Postgres on workers is not ready yet...';
        sleep 2;
      done;
      echo 'Workers are UP! Starting master...';
      exec /usr/local/bin/docker-entrypoint.sh postgres"

  worker1:
    container_name: "${COMPOSE_PROJECT_NAME:-citus}_worker1"
    image: 'citusdata/citus:12.1'
    labels: [ "com.citusdata.role=worker" ]
    environment: *AUTH
    depends_on: [ master ]
    volumes:
      - citus_worker1_data:/var/lib/postgresql/data
      - ./db-config/init_worker.sql:/docker-entrypoint-initdb.d/init.sql

  worker2:
    container_name: "${COMPOSE_PROJECT_NAME:-citus}_worker2"
    image: 'citusdata/citus:12.1'
    labels: [ "com.citusdata.role=worker" ]
    environment: *AUTH
    depends_on: [ master ]
    volumes:
      - citus_worker2_data:/var/lib/postgresql/data
      - ./db-config/init_worker.sql:/docker-entrypoint-initdb.d/init.sql

  # manager:
  #   container_name: "${COMPOSE_PROJECT_NAME:-citus}_manager"
