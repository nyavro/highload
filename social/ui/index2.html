<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Feed</title>
</head>
<body>
    <h1>Real-time posts aad8a25f-0cdd-48bd-a0dd-46c198dcf7cf</h1>
    <div id="log"></div>
    <script>
        const ws = new WebSocket('ws://localhost:3000/post/feed/posted?user_id=aad8a25f-0cdd-48bd-a0dd-46c198dcf7cf');
        ws.onmessage = (event) => {
            const div = document.getElementById('log');
            div.innerHTML = '<p>' + event.data + '</p>' + div.innerHTML;
        };
        ws.onopen = () => console.log('Connected');
        ws.onclose = () => console.log('Disconnected');
    </script>
</body>
</html>
