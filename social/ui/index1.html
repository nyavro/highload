<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Feed</title>
</head>
<body>
    <h1>Real-time posts 90c3c5e4-7e14-439a-bef0-c225fb9617af</h1>
    <div id="log"></div>
    <script>
        const ws = new WebSocket('ws://localhost:3000/post/feed/posted?user_id=90c3c5e4-7e14-439a-bef0-c225fb9617af');
        ws.onmessage = (event) => {
            const div = document.getElementById('log');
            div.innerHTML = '<p>' + event.data + '</p>' + div.innerHTML;
        };
        ws.onopen = () => console.log('Connected');
        ws.onclose = () => console.log('Disconnected');
    </script>
</body>
</html>
