services:
  postgres-master:
    image: postgres:13.3
    container_name: postgres-master
    environment:
      POSTGRES_DB: "highload"
      POSTGRES_USER: "pguser"
      POSTGRES_PASSWORD: "pgpassword"
      PG_REPLICA_SLOTS: "replica_slot1,replica_slot2"
    ports:
      - "5432:5432"
    volumes:
      - postgres-master-data:/var/lib/postgresql/data
      - ./db-config/init-master.sh:/docker-entrypoint-initdb.d/init-master.sh
      - ./db-config/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db-config/data/people.v2.csv:/docker-entrypoint-initdb.d/data.csv
      - ./db-config/data/posts.txt:/docker-entrypoint-initdb.d/posts.txt    

  postgres-replica-1:
    image: postgres:13.3
    container_name: postgres-replica-1
    environment:
      POSTGRES_DB: "highload"
      POSTGRES_USER: "pguser"
      POSTGRES_PASSWORD: "pgpassword"
      REPLICATOR_PASSWORD: "replicator_password"
      PGUSER: "pguser"
      PG_SLOT: "replica_slot1"
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-1-data:/var/lib/postgresql/data
      - ./db-config/init-replica.sh:/usr/local/bin/init-and-run-replica.sh    
    depends_on:
      - postgres-master
    command: ["/usr/local/bin/init-and-run-replica.sh"]
  postgres-replica-2:
    image: postgres:13.3
    container_name: postgres-replica-2
    environment:
      POSTGRES_DB: "highload"
      POSTGRES_USER: "pguser"
      POSTGRES_PASSWORD: "pgpassword"
      REPLICATOR_PASSWORD: "replicator_password"
      PGUSER: "pguser"
      PG_SLOT: "replica_slot2"
    ports:
      - "5434:5432"
    volumes:
      - postgres-replica-2-data:/var/lib/postgresql/data
      - ./db-config/init-replica.sh:/usr/local/bin/init-and-run-replica.sh    
    depends_on:
      - postgres-master
    command: ["/usr/local/bin/init-and-run-replica.sh"]

  redis:
    image: redis:7-alpine
    container_name: redis_app
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --requirepass secure_password --appendonly yes

  rabbitmq-1:
    image: rabbitmq:3.12-management-alpine
    hostname: rabbitmq-1
    container_name: rabbitmq-1
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_ERLANG_COOKIE=secret_cookie
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq-1-data:/var/lib/rabbitmq
    networks:
      - rabbitmq-cluster
    command: >
      sh -c "
        rabbitmq-server
      "

  rabbitmq-2:
    image: rabbitmq:3.12-management-alpine
    hostname: rabbitmq-2
    container_name: rabbitmq-2
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_ERLANG_COOKIE=secret_cookie
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq-2-data:/var/lib/rabbitmq
    networks:
      - rabbitmq-cluster
    depends_on:
      - rabbitmq-1
    command: >
      sh -c "
        sleep 10 &&
        rabbitmq-server -detached &&
        sleep 5 &&
        rabbitmqctl stop_app &&
        rabbitmqctl reset &&
        rabbitmqctl join_cluster rabbit@rabbitmq-1 &&
        rabbitmqctl start_app &&
        tail -f /dev/null
      "

  rabbitmq-3:
    image: rabbitmq:3.12-management-alpine
    hostname: rabbitmq-3
    container_name: rabbitmq-3
    ports:
      - "5674:5672"
      - "15674:15672"
    environment:
      - RABBITMQ_ERLANG_COOKIE=secret_cookie
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq-3-data:/var/lib/rabbitmq
    networks:
      - rabbitmq-cluster
    depends_on:
      - rabbitmq-1
      - rabbitmq-2
    command: >
      sh -c "
        sleep 15 &&
        rabbitmq-server -detached &&
        sleep 5 &&
        rabbitmqctl stop_app &&
        rabbitmqctl reset &&
        rabbitmqctl join_cluster rabbit@rabbitmq-1 &&
        rabbitmqctl start_app &&
        tail -f /dev/null
      "

volumes:
  postgres-master-data:
  postgres-replica-1-data:
  postgres-replica-2-data:
  rabbitmq-1-data:
  rabbitmq-2-data:
  rabbitmq-3-data:

networks:
  rabbitmq-cluster:
    driver: bridge  